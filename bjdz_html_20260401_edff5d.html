<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>外贸报价单系统 - 多币种/图片上传</title>
    <!-- 使用多个 CDN 源，并添加 fallback -->
    <script>
        // 动态加载 SheetJS 库，确保加载成功
        function loadSheetJS() {
            return new Promise((resolve, reject) => {
                // 如果已经加载
                if (typeof XLSX !== 'undefined') {
                    resolve();
                    return;
                }
                
                const cdnUrls = [
                    'https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js',
                    'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
                    'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js'
                ];
                
                let currentIndex = 0;
                
                function tryLoad() {
                    if (currentIndex >= cdnUrls.length) {
                        reject(new Error('所有CDN都无法加载SheetJS库'));
                        return;
                    }
                    
                    const script = document.createElement('script');
                    script.src = cdnUrls[currentIndex];
                    script.onload = () => {
                        if (typeof XLSX !== 'undefined') {
                            resolve();
                        } else {
                            currentIndex++;
                            tryLoad();
                        }
                    };
                    script.onerror = () => {
                        currentIndex++;
                        tryLoad();
                    };
                    document.head.appendChild(script);
                }
                
                tryLoad();
            });
        }
        
        // 加载 Mammoth (保留以备后续扩展)
        function loadMammoth() {
            return new Promise((resolve, reject) => {
                if (typeof mammoth !== 'undefined') {
                    resolve();
                    return;
                }
                
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/mammoth@1.4.2/mammoth.browser.min.js';
                script.onload = () => resolve();
                script.onerror = () => reject(new Error('Mammoth库加载失败'));
                document.head.appendChild(script);
            });
        }
        
        // 等待所有库加载完成
        window.librariesReady = Promise.all([
            loadSheetJS().catch(e => console.warn('SheetJS加载警告:', e.message)),
            loadMammoth().catch(e => console.warn('Mammoth加载警告:', e.message))
        ]);
    </script>
    <style>

            }

            .right-panel { padding: 0 !important; background: white !important; margin: 0 auto !important; width: 100% !important; box-shadow: none !important; }

        }

        .section-title { font-size: 1.25rem; font-weight: 600; border-left: 5px solid #0d6efd; padding-left: 12px; margin-bottom: 18px; margin-top: 8px; color: #1e2a3e; }
        .upload-area { background: #f1f3f5; border-radius: 16px; padding: 18px 20px; margin-bottom: 28px; border: 1px solid #dee2e6; }
        .upload-label { display: inline-block; background: #0d6efd; color: white; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: 500; font-size: 14px; margin-top: 8px; border: none; transition: 0.2s; }

        .product-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        .product-row input { flex: 1; min-width: 100px; padding: 8px 10px; border-radius: 10px; border: 1px solid #ced4da; }
        .btn-icon { background: none; border: none; font-size: 20px; cursor: pointer; color: #dc3545; padding: 4px 8px; }

        table { width: 100%; border-collapse: collapse; margin: 18px 0; font-size: 12px; }

        .total-row { font-weight: bold; text-align: right; margin-top: 10px; font-size: 14px; }
        .remark { margin-top: 28px; font-size: 11px; border-top: 1px dashed #aaa; padding-top: 14px; }
        .print-btn, .gen-btn { background: #212529; color: white; border: none; padding: 12px 18px; border-radius: 40px; font-weight: 600; cursor: pointer; margin-top: 20px; width: 100%; font-size: 15px; transition: 0.2s; }
        .gen-btn { background: #0d6efd; margin-top: 0; margin-bottom: 10px; }
        .print-btn { background: #2b3e4e; }
        .btn-group { display: flex; gap: 12px; margin-top: 12px; }
        .help-text { font-size: 12px; color: #6c757d; margin-top: 5px; }
        .status-msg { margin-top: 10px; font-size: 12px; padding: 8px 12px; border-radius: 8px; background: #e7f3ff; color: #0d6efd; font-weight: 500; white-space: pre-wrap; word-break: break-all; }
        .status-msg.error { background: #ffe7e7; color: #dc3545; }
        .status-msg.success { background: #e7ffe7; color: #28a745; }
        .status-msg.warning { background: #fff3cd; color: #856404; }
        .reload-btn { background: #6c757d; margin-left: 10px; padding: 4px 12px; font-size: 12px; border-radius: 20px; border: none; color: white; cursor: pointer; }
        .currency-selector-wrapper { margin-bottom: 20px; display: flex; align-items: center; gap: 15px; background: #f1f3f5; padding: 8px 16px; border-radius: 40px; width: fit-content; }
        .currency-label { font-weight: 600; font-size: 14px; color: #2c3e50; }
        .currency-select { padding: 6px 12px; border-radius: 30px; border: 1px solid #ced4da; background: white; font-weight: 500; cursor: pointer; }
        .img-upload-btn { background: #6c757d; color: white; border: none; border-radius: 20px; padding: 4px 12px; font-size: 12px; cursor: pointer; margin-left: 8px; transition: 0.2s; }
        .img-upload-btn:hover { background: #0d6efd; }
        .product-img-preview { display: inline-block; vertical-align: middle; margin-right: 5px; max-width: 40px; max-height: 35px; border-radius: 6px; border: 1px solid #ddd; }
    </style>

<body>
<div class="app-container">
    <div class="lang-bar">
        <button class="lang-btn active" data-lang="en">English</button>
        <button class="lang-btn" data-lang="zh">中文</button>
    </div>

    <div class="editor-preview">
        <div class="left-panel">
            <div class="section-title" data-i18n="import_title">📄 1. 导入数据 (Excel/Word/TXT)</div>
            <div class="upload-area">
                <button class="upload-label" id="uploadBtn">📂 选择文件并导入</button>
                <input type="file" id="fileUpload" accept=".xlsx,.xls,.csv,.txt,.doc,.docx" style="display:none" />
                <div class="file-name" id="fileNameDisplay">未选择文件</div>
                <div class="status-msg" id="uploadStatusMsg">🔄 正在加载解析库，请稍候...</div>
                <div class="help-text">📌 支持格式：Excel(.xlsx/.xls) 需包含 Products 和 CompanyInfo 工作表；Word(.docx) 或 TXT 将自动提取产品信息。</div>
            </div>

            <div class="section-title" data-i18n="company_info">🏢 公司抬头 & 基本资料</div>
            <div class="info-grid" id="companyInfoFields">
                <div class="field-row"><label data-i18n="header_eng">公司英文抬头</label><input type="text" id="companyName" placeholder="ABC Trading Co.,Ltd" value="SUNRISE IMPEX LTD"></div>
                <div class="field-row"><label>Website</label><input type="text" id="website" placeholder="www.xxx.com" value="www.sunriseimpex.com"></div>
                <div class="field-row"><label>Add</label><input type="text" id="address" placeholder="NO-2F-B206, xxxx" value="NO-2F-B206, Huafa Business Center, Shenzhen"></div>
                <div class="field-row"><label>Tel / Fax</label><input type="text" id="telFax" placeholder="Tel:xxxx   Fax:xxxx" value="Tel: +86 755 8888 1234   Fax: +86 755 8888 1235"></div>
                <div class="field-row"><label data-i18n="offer_date">Offer Date</label><input type="text" id="offerDate" placeholder="2025-03-29" value="2026-03-30"></div>
                <div class="field-row"><label data-i18n="expiry_date">Expiry Date</label><input type="text" id="expiryDate" placeholder="2025-04-29" value="2026-04-29"></div>
                <div class="field-row"><label data-i18n="from_sales">From (Sales)</label><input type="text" id="salesPerson" placeholder="业务员" value="Michael Zhang"></div>
            </div>

            <div class="section-title" data-i18n="product_edit">📦 产品明细 (可编辑/增删)</div>
            <div id="productListContainer"></div>
            <button class="add-product-btn" id="addProductBtn">+ 添加产品</button>

            <div class="section-title" data-i18n="cost_edit">📌 其他费用/说明 (Cost name)</div>
            <div id="costListContainer"></div>
            <button class="add-product-btn" id="addCostBtn">+ 添加费用项</button>

            <div class="btn-group">
                <button class="gen-btn" id="refreshPreviewBtn">✨ 刷新预览 & 同步模板</button>
            </div>
        </div>

        <div class="right-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                <div class="section-title" style="margin-bottom: 0;" data-i18n="preview_title">📄 报价单预览</div>
                <div class="currency-selector-wrapper">
                    <span class="currency-label">💱 报价货币:</span>
                    <select id="currencySelector" class="currency-select">
                        <option value="USD">🇺🇸 USD (美元)</option>
                        <option value="CNY">🇨🇳 CNY (人民币)</option>
                        <option value="PHP">🇵🇭 PHP (菲律宾比索)</option>
                    </select>
                </div>
            </div>
            <div id="quotationPreview" class="quotation-preview"></div>
            <button class="print-btn" id="dynamicActionBtn">🖨️ 导出 / 打印报价单</button>
        </div>
    </div>
</div>

<script>
    // 汇率配置 (参考汇率, 可动态修改)
    const exchangeRates = {
        USD: 1,
        CNY: 7.25,
        PHP: 57.50
    };
    let currentCurrency = 'USD';
    
    // 多语言
    const i18n = {
        en: {
            import_title: "📄 1. Import Data (Excel/Word/TXT)",
            company_info: "🏢 Company Header & Info",
            product_edit: "📦 Product List (Editable)",
            cost_edit: "💰 Additional Costs / Description",
            preview_title: "📄 Quotation Preview",
            header_eng: "Company English Name",
            offer_date: "Offer Date",
            expiry_date: "Expiry Date",
            from_sales: "From (Sales)",
            price_term: "Price Term"
        },
        zh: {
            import_title: "📄 1. 导入数据 (Excel/Word/TXT)",
            company_info: "🏢 公司抬头及基本信息",
            product_edit: "📦 产品明细 (可编辑)",
            cost_edit: "💰 其他费用/说明项",
            preview_title: "📄 报价单预览",
            header_eng: "公司英文抬头",
            offer_date: "报价日期",
            expiry_date: "报价有效期",
            from_sales: "业务员",
            price_term: "价格术语"
        }
    };
    let currentLang = 'en';
    let librariesReady = false;

    // 数据模型
    let products = [
        { name: "LED Desk Lamp", img: "https://placehold.co/60x50?text=LED", desc: "Touch control, 3 color temps", packing: "Color box", qty: 500, unitPrice: 12.50, amount: 6250.00 },
        { name: "Bluetooth Speaker", img: "https://placehold.co/60x50?text=Speaker", desc: "Waterproof IPX7", packing: "Gift box", qty: 300, unitPrice: 23.80, amount: 7140.00 }
    ];
    let costs = [{ name: "Shipping Cost", description: "Sea freight to LA port", qty: 1, unitPrice: 850.00, amount: 850.00 }];
    
    function getCurrentCompanyData() {
        return {
            name: document.getElementById('companyName')?.value || "SUNRISE IMPEX LTD",
            website: document.getElementById('website')?.value || "www.sunriseimpex.com",
            address: document.getElementById('address')?.value || "NO-2F-B206, Huafa Business Center, Shenzhen",
            telFax: document.getElementById('telFax')?.value || "Tel: +86 755 8888 1234",
            offerDate: document.getElementById('offerDate')?.value || "2026-03-30",
            expiryDate: document.getElementById('expiryDate')?.value || "2026-04-29",
            salesPerson: document.getElementById('salesPerson')?.value || "Michael Zhang",
            priceTerm: document.getElementById('priceTermInput')?.value || "FOB Shenzhen",
        };
    }

    function calcTotalAmount() {
        let prodTotal = products.reduce((sum, p) => sum + (p.amount || 0), 0);
        let costTotal = costs.reduce((sum, c) => sum + (c.amount || 0), 0);
        return prodTotal + costTotal;
    }
    
    // 获取转换后的金额显示 (根据当前货币)
    function getConvertedAmount(usdAmount) {
        const rate = exchangeRates[currentCurrency] || 1;
        return usdAmount * rate;
    }
    
    function formatCurrency(usdAmount) {
        const converted = getConvertedAmount(usdAmount);
        const symbol = currentCurrency === 'USD' ? '$' : (currentCurrency === 'CNY' ? '¥' : '₱');
        return `${symbol}${converted.toFixed(2)}`;
    }

    function showStatus(message, type = 'info') {
        const statusDiv = document.getElementById('uploadStatusMsg');
        if (statusDiv) {
            statusDiv.innerHTML = message;
            statusDiv.className = `status-msg ${type}`;
        }
    }

    // 渲染产品列表 (增加图片上传按钮)
    function renderProductEditors() {
        const container = document.getElementById('productListContainer');
        if (!container) return;
        container.innerHTML = '';
        products.forEach((prod, idx) => {
            const div = document.createElement('div');
            div.className = 'product-item';
            // 图片预览小图
            const imgPreview = prod.img && prod.img !== '' ? `<img src="${escapeHtml(prod.img)}" class="product-img-preview" onerror="this.src='https://placehold.co/60x50?text=No+Image'" />` : '';
            div.innerHTML = `
                <div class="product-row">
                    <input type="text" placeholder="Product Name" value="${escapeHtml(prod.name)}" data-field="name" data-idx="${idx}" class="prod-input" style="flex:2">
                    <div style="display:flex; align-items:center; gap:6px; flex:2">
                        <input type="text" placeholder="Image URL" value="${escapeHtml(prod.img)}" data-field="img" data-idx="${idx}" class="prod-input img-url-input" style="flex:3">
                        <button type="button" class="img-upload-btn" data-imgidx="${idx}">📁 上传图片</button>
                    </div>
                    <input type="text" placeholder="Description" value="${escapeHtml(prod.desc)}" data-field="desc" data-idx="${idx}" class="prod-input" style="flex:2">
                </div>
                <div class="product-row">
                    <input type="text" placeholder="Packing" value="${escapeHtml(prod.packing)}" data-field="packing" data-idx="${idx}" class="prod-input">
                    <input type="number" placeholder="Quantity" value="${prod.qty}" data-field="qty" data-idx="${idx}" class="prod-input">
                    <input type="number" step="0.01" placeholder="Unit Price (USD)" value="${prod.unitPrice}" data-field="unitPrice" data-idx="${idx}" class="prod-input">
                    <span>Amount: <strong>${(prod.amount || 0).toFixed(2)} USD</strong></span>
                    <button class="btn-icon" data-delidx="${idx}">🗑️</button>
                </div>
                <div class="product-row" style="margin-top:4px;">
                    <span style="font-size:12px; color:#6c757d;">图片预览: ${imgPreview || '无'}</span>
                </div>
            `;
            container.appendChild(div);
        });
        attachProductEvents();
        attachImageUploadEvents();
    }
    
    function attachImageUploadEvents() {
        document.querySelectorAll('.img-upload-btn').forEach(btn => {
            btn.removeEventListener('click', handleImageUploadClick);
            btn.addEventListener('click', handleImageUploadClick);
        });
    }
    
    function handleImageUploadClick(e) {
        const idx = parseInt(e.target.dataset.imgidx);
        if (isNaN(idx)) return;
        // 创建隐藏 file input
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'image/jpeg,image/png,image/gif,image/webp';
        fileInput.onchange = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const imgDataUrl = ev.target.result;
                if (products[idx]) {
                    products[idx].img = imgDataUrl;
                    renderProductEditors();
                    renderQuotation();
                    showStatus(`✅ 产品 "${products[idx].name}" 图片已上传`, "success");
                }
            };
            reader.readAsDataURL(file);
        };
        fileInput.click();
    }

    function attachProductEvents() {
        document.querySelectorAll('.prod-input').forEach(inp => {
            inp.removeEventListener('input', handleProductInput);
            inp.addEventListener('input', handleProductInput);
        });
        document.querySelectorAll('.btn-icon[data-delidx]').forEach(btn => {
            btn.removeEventListener('click', handleProductDelete);
            btn.addEventListener('click', handleProductDelete);
        });
    }

    function handleProductInput(e) {
        const idx = parseInt(e.target.dataset.idx);
        const field = e.target.dataset.field;
        let val = e.target.value;
        if (field === 'qty' || field === 'unitPrice') val = parseFloat(val) || 0;
        if (products[idx]) {
            products[idx][field] = val;
            if (field === 'qty' || field === 'unitPrice') {
                products[idx].amount = (products[idx].qty || 0) * (products[idx].unitPrice || 0);
            }
            renderProductEditors();
            renderQuotation();
        }
    }
    
    function handleProductDelete(e) {
        const idx = parseInt(e.target.dataset.delidx);
        products.splice(idx, 1);
        renderProductEditors();
        renderQuotation();
    }

    function renderCostEditors() {
        const container = document.getElementById('costListContainer');
        if (!container) return;
        container.innerHTML = '';
        costs.forEach((cost, idx) => {
            const div = document.createElement('div');
            div.className = 'product-item';
            div.innerHTML = `
                <div class="product-row">
                    <input type="text" placeholder="Cost name" value="${escapeHtml(cost.name)}" data-cfield="name" data-cidx="${idx}" class="cost-input">
                    <input type="text" placeholder="Description" value="${escapeHtml(cost.description)}" data-cfield="description" data-cidx="${idx}" class="cost-input">
                    <input type="number" placeholder="Qty" value="${cost.qty}" data-cfield="qty" data-cidx="${idx}" class="cost-input">
                    <input type="number" step="0.01" placeholder="Unit Price (USD)" value="${cost.unitPrice}" data-cfield="unitPrice" data-cidx="${idx}" class="cost-input">
                    <span>Amount: ${(cost.amount || 0).toFixed(2)} USD</span>
                    <button class="btn-icon" data-cdelidx="${idx}">🗑️</button>
                </div>
            `;
            container.appendChild(div);
        });
        attachCostEvents();
    }
    
    function attachCostEvents() {
        document.querySelectorAll('.cost-input').forEach(inp => {
            inp.removeEventListener('input', handleCostInput);
            inp.addEventListener('input', handleCostInput);
        });
        document.querySelectorAll('.btn-icon[data-cdelidx]').forEach(btn => {
            btn.removeEventListener('click', handleCostDelete);
            btn.addEventListener('click', handleCostDelete);
        });
    }
    
    function handleCostInput(e) {
        const idx = parseInt(e.target.dataset.cidx);
        const field = e.target.dataset.cfield;
        let val = e.target.value;
        if (field === 'qty' || field === 'unitPrice') val = parseFloat(val) || 0;
        if (costs[idx]) {
            costs[idx][field] = val;
            if (field === 'qty' || field === 'unitPrice') {
                costs[idx].amount = (costs[idx].qty || 0) * (costs[idx].unitPrice || 0);
            }
            renderCostEditors();
            renderQuotation();
        }
    }
    
    function handleCostDelete(e) {
        const idx = parseInt(e.target.dataset.cdelidx);
        costs.splice(idx, 1);
        renderCostEditors();
        renderQuotation();
    }

    function getQuotationHTML() {
        const companyData = getCurrentCompanyData();
        const productRows = products.map(p => {
            const unitPriceConverted = formatCurrency(p.unitPrice);
            const amountConverted = formatCurrency(p.amount);
            return `
            <tr>
                <td>${escapeHtml(p.name)}</td>
                <td style="text-align:center"><img src="${escapeHtml(p.img)}" class="product-img" onerror="this.src='https://placehold.co/60x50?text=No+Image'" alt="pic"></td>
                <td>${escapeHtml(p.desc)}</td>
                <td>${escapeHtml(p.packing)}</td>
                <td>${p.qty}</td>
                <td>${unitPriceConverted}</td>
                <td>${amountConverted}</td>
            </tr>`;
        }).join('');
        
        const costRows = costs.map(c => {
            const unitPriceConverted = formatCurrency(c.unitPrice);
            const amountConverted = formatCurrency(c.amount);
            return `<tr><td>${escapeHtml(c.name)}</td><td colspan="2">${escapeHtml(c.description)}</td><td>${c.qty}</td><td>${unitPriceConverted}</td><td colspan="2">${amountConverted}</td></tr>`;
        }).join('');
        
        const totalUSD = calcTotalAmount();
        const totalConverted = formatCurrency(totalUSD);
        const currencySymbol = currentCurrency === 'USD' ? '$' : (currentCurrency === 'CNY' ? '¥' : '₱');
        
        return `
            <div class="company-header">
                <div class="company-name">${escapeHtml(companyData.name)}</div>
                <div class="company-details">Website: ${escapeHtml(companyData.website)} &nbsp;|&nbsp; ${escapeHtml(companyData.telFax)}</div>
                <div class="company-details">Add: ${escapeHtml(companyData.address)}</div>
                <div class="company-details"><strong>Offer Date:</strong> ${escapeHtml(companyData.offerDate)} &nbsp;&nbsp; <strong>Expiry Date:</strong> ${escapeHtml(companyData.expiryDate)} &nbsp;&nbsp; <strong>From:</strong> ${escapeHtml(companyData.salesPerson)}</div>
            </div>
            <div class="quotation-title">QUOTATION SHEET (${currentCurrency})</div>
            <table>
                <thead><tr><th>Product Name</th><th>Picture</th><th>Description</th><th>Packing</th><th>Quantity</th><th>Unit Price</th><th>Amount</th></tr></thead>
                <tbody>${productRows || '<tr><td colspan="7">No products</td></tr>'}</tbody>
            </table>
            ${costs.length ? `<table class="cost-table"><thead><tr><th>Cost name</th><th colspan="2">Description</th><th>Quantity</th><th>Unit Price</th><th colspan="2">Amount</th></tr></thead><tbody>${costRows}</tbody></table>` : ''}
            <div><strong>Price Term:</strong> ${escapeHtml(companyData.priceTerm)}</div>
            <div class="total-row"><strong>Total Amount (${currentCurrency}):</strong> ${totalConverted}</div>
            <div class="remark"><p><strong>Remark & Terms</strong></p><p>1. Payment Terms: T/T (Wire Transfer, 50% before production, the balance before shipment).</p><p>2. Time of Delivery: Normally within 30 working days.</p><p>3. Package: Paper box + carton box</p></div>
        `;
    }
    
    function renderQuotation() {
        const previewDiv = document.getElementById('quotationPreview');
        if (previewDiv) previewDiv.innerHTML = getQuotationHTML();
    }

    function exportToExcel() {
        if (typeof XLSX === 'undefined') { showStatus("❌ Excel库未就绪，请稍后重试", "error"); return; }
        try {
            const companyData = getCurrentCompanyData();
            const totalUSD = calcTotalAmount();
            const totalConverted = formatCurrency(totalUSD);
            const wb = XLSX.utils.book_new();
            const sheetData = [];
            sheetData.push([companyData.name], [`Website: ${companyData.website}  |  ${companyData.telFax}`], [`Add: ${companyData.address}`],
                [`Offer Date: ${companyData.offerDate}    Expiry Date: ${companyData.expiryDate}    From: ${companyData.salesPerson}`], [],
                [`QUOTATION SHEET (Currency: ${currentCurrency})`], [], ["Product Name", "Picture URL", "Description", "Packing", "Quantity", `Unit Price (${currentCurrency})`, `Amount (${currentCurrency})`]);
            products.forEach(p => {
                const unitPriceConv = formatCurrency(p.unitPrice);
                const amountConv = formatCurrency(p.amount);
                sheetData.push([p.name, p.img, p.desc, p.packing, p.qty, unitPriceConv, amountConv]);
            });
            sheetData.push([]);
            if (costs.length) { sheetData.push(["Cost name", "Description", "", "Quantity", `Unit Price (${currentCurrency})`, `Amount (${currentCurrency})`]); costs.forEach(c => sheetData.push([c.name, c.description, "", c.qty, formatCurrency(c.unitPrice), formatCurrency(c.amount)])); sheetData.push([]); }
            sheetData.push([`Price Term: ${companyData.priceTerm}`], [`Total Amount (${currentCurrency}): ${totalConverted}`], [], ["Remark & Terms"], ["1. Payment Terms: T/T..."], ["2. Time of Delivery: 30 working days"], ["3. Package: Paper box + carton box"]);
            const ws = XLSX.utils.aoa_to_sheet(sheetData);
            XLSX.utils.book_append_sheet(wb, ws, "Quotation");
            XLSX.writeFile(wb, `Quotation_${companyData.name.replace(/\s/g, '_')}_${currentCurrency}_${new Date().toISOString().slice(0,19)}.xlsx`);
            showStatus("✅ 报价单已导出", "success");
        } catch (e) { showStatus("❌ 导出失败: " + e.message, "error"); }
    }
    
    function printQuotation() { const title = document.title; document.title = ""; window.print(); setTimeout(() => { document.title = title; }, 100); }

    // Excel 解析 (保持原有逻辑，但新增字段映射价格术语)
    async function parseExcelFile(file, data) {
        if (typeof XLSX === 'undefined') { showStatus("❌ Excel库未加载，请刷新页面重试", "error"); return false; }
        try {
            const workbook = XLSX.read(data, { type: 'array' });
            const productSheet = workbook.Sheets["Products"] || workbook.Sheets["Product"];
            if (productSheet) {
                const rows = XLSX.utils.sheet_to_json(productSheet, { header: 1, defval: "" });
                if (rows && rows.length > 1) {
                    const newProducts = [];
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (!row || row.length < 6) continue;
                        const name = row[0] ? String(row[0]).trim() : "";
                        if (!name || name === "ProductName") continue;
                        const qty = parseFloat(row[4]) || 0;
                        const price = parseFloat(row[5]) || 0;
                        if (qty === 0 && price === 0) continue;
                        newProducts.push({ name, img: row[1] ? String(row[1]) : "https://placehold.co/60x50?text=Product", desc: row[2] ? String(row[2]) : "", packing: row[3] ? String(row[3]) : "Standard", qty, unitPrice: price, amount: qty * price });
                    }
                    if (newProducts.length) { products = newProducts; renderProductEditors(); showStatus(`✅ 导入 ${products.length} 个产品`, "success"); }
                }
            }
            const companySheet = workbook.Sheets["CompanyInfo"] || workbook.Sheets["Company"];
            if (companySheet) {
                const rows = XLSX.utils.sheet_to_json(companySheet, { header: 1, defval: "" });
                for (let row of rows) {
                    if (!row || row.length < 2) continue;
                    const field = row[0] ? String(row[0]).trim() : "";
                    const value = row[1] ? String(row[1]).trim() : "";
                    if (field === "CompanyName") document.getElementById('companyName').value = value;
                    if (field === "Website") document.getElementById('website').value = value;
                    if (field === "Address") document.getElementById('address').value = value;
                    if (field === "TelFax") document.getElementById('telFax').value = value;
                    if (field === "OfferDate") document.getElementById('offerDate').value = value;
                    if (field === "ExpiryDate") document.getElementById('expiryDate').value = value;
                    if (field === "SalesPerson") document.getElementById('salesPerson').value = value;
                    if (field === "PriceTerm") document.getElementById('priceTermInput').value = value;
                }
                showStatus("✅ 公司信息已更新", "success");
            }
            renderQuotation();
            return true;
        } catch (e) { showStatus("❌ 解析失败: " + e.message, "error"); return false; }
    }

    async function importGeneralFile(file) {
        showStatus(`📄 正在解析: ${file.name}...`, "info");
        try {
            if (file.name.match(/\.xlsx?$|\.xls$|\.csv$/i)) {
                const data = await file.arrayBuffer();
                await parseExcelFile(file, data);
                return;
            }
            showStatus(`❌ 请上传 Excel 格式文件 (.xlsx/.xls)，包含 Products 和 CompanyInfo 工作表`, "error");
        } catch (e) { showStatus("❌ 解析失败: " + e.message, "error"); }
    }

    let actionClickCount = 0;
    function onMainActionClick() { actionClickCount++; if (actionClickCount % 2 === 1) printQuotation(); else exportToExcel(); }

    async function init() {
        await window.librariesReady;
        librariesReady = true;
        showStatus("✨ 系统已就绪，点击「选择文件并导入」上传您的 Excel 报价模板 | 支持货币切换 & 产品图片上传", "success");
        
        const fileInput = document.getElementById('fileUpload');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileNameSpan = document.getElementById('fileNameDisplay');
        
        uploadBtn.onclick = () => fileInput.click();
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            fileNameSpan.innerText = `已选: ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;
            await importGeneralFile(file);
            fileInput.value = '';
        };
        
        document.getElementById('addProductBtn').onclick = () => { products.push({ name: "New Product", img: "https://placehold.co/60x50?text=New", desc: "", packing: "Carton", qty: 1, unitPrice: 0, amount: 0 }); renderProductEditors(); renderQuotation(); };
        document.getElementById('addCostBtn').onclick = () => { costs.push({ name: "Other cost", description: "", qty: 1, unitPrice: 0, amount: 0 }); renderCostEditors(); renderQuotation(); };
        document.getElementById('refreshPreviewBtn').onclick = () => { renderProductEditors(); renderCostEditors(); renderQuotation(); };
        document.getElementById('dynamicActionBtn').onclick = onMainActionClick;
        
        // 添加价格术语输入框
        const priceTermDiv = document.createElement('div'); priceTermDiv.className = 'field-row';
        priceTermDiv.innerHTML = `<label data-i18n="price_term">Price Term</label><input type="text" id="priceTermInput" placeholder="FOB/CIF" value="FOB Shenzhen">`;
        document.getElementById('companyInfoFields').appendChild(priceTermDiv);
        
        // 货币切换监听
        const currencySelect = document.getElementById('currencySelector');
        currencySelect.addEventListener('change', (e) => {
            currentCurrency = e.target.value;
            renderQuotation();
        });
        
        renderProductEditors(); 
        renderCostEditors(); 
        renderQuotation();
        
        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => { const key = el.dataset.i18n; if (i18n[lang][key]) el.innerText = i18n[lang][key]; });
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
        }
        document.querySelectorAll('.lang-btn').forEach(btn => btn.onclick = () => setLanguage(btn.dataset.lang));
        setLanguage('en');
    }
    
    function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m)); }
    
    init();
</script>
</body>
